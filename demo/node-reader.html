    body: `Evergreen notes are notes written and organized to **evolve, contribute, and accumulate** over time, across projects. This is opposed to the usual pattern of note-taking that is transient — optimized for a single moment of capture and rarely revisited.

The practice originates in the work of [Andy Matuschak](/entities/andy-matuschak.md), who argued that most note-taking fails because notes are treated as disposable records rather than as durable *units of thought*.

> The most powerful reason to write notes is that it forces you to develop your thinking. If your notes are worth keeping, they are worth keeping well.

## Core principles

Evergreen notes work because they impose a small set of constraints that, followed consistently, compound:

- **Atomic** — each note captures exactly one idea, so it can be linked and reused independently. See [Atomic Notes](/concepts/atomic-notes.md).
- **Concept-oriented** — notes are organized by idea, not by source or date, which lets ideas from different sources collide productively.
- **Densely linked** — a note earns its keep by connecting to others; the links *are* the knowledge graph.
- **Written for your future self** — phrased as durable claims, not context-dependent scraps.

## Why it compounds

A transient note has value once. An evergreen note is re-encountered, refined, and re-linked, so its value grows with the size of the surrounding graph. This is the same mechanism behind [Spaced Repetition](/concepts/spaced-repetition.md): repeated, effortful contact with an idea strengthens and extends it.

In practice the returns show up slowly, then suddenly — the graph is mostly disconnected fragments until a critical mass of links makes previously distant ideas one hop apart.

## Practice

Turning capture into evergreen notes is a daily habit, not a one-time migration. The [Daily Note Review](/playbooks/daily-note-review.md) playbook describes the concrete loop; the broader filing method comes from the [Zettelkasten](/systems/zettelkasten.md) system.

  const c = NODES[path];
  const map = new Map();
  extractLinks(c.body).forEach(l => { if (NODES[l.path]) map.set(l.path, { path: l.path, out: true, in: false }); });
  backlinksFor(path).forEach(b => {
    if (map.has(b.path)) map.get(b.path).in = true;
    else map.set(b.path, { path: b.path, out: false, in: true });
  });
  return [...map.values()];
}

function localGraphBlock(path) {
  const center = NODES[path];
  let nbs = neighborsOf(path);
  const CAP = 9;
  let extra = 0;
  if (nbs.length > CAP) { extra = nbs.length - CAP; nbs = nbs.slice(0, CAP); }

  const W = 272, H = 232, cx = W / 2, cy = H / 2, R = 76, cr = 13, nr = 9;

  if (!nbs.length) {
    return `<div class="localgraph"><div class="lg-cap">No linked nodes yet — this node is an orphan.</div></div>`;
  }

  function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  // bright palette so the mini-graph pops on its dark inset
  const G = { concept: "#6f9bff", entity: "#e0a34d", playbook: "#55c39a", reference: "#d07fd0", system: "#d9776c" };  function arrow(x, y, ux, uy, color) {
    const s = 5, w = 3.2, bx = x - ux * s, by = y - uy * s, px = -uy, py = ux;
    return `<polygon class="lg-arrow" points="${x.toFixed(1)},${y.toFixed(1)} ${(bx + px * w).toFixed(1)},${(by + py * w).toFixed(1)} ${(bx - px * w).toFixed(1)},${(by - py * w).toFixed(1)}" fill="${color}"></polygon>`;
  }

  let edges = "", nodes = "";
  nbs.forEach((nb, i) => {
    const n = NODES[nb.path];
    const col = G[n.type];
    const a = -Math.PI / 2 + (i / nbs.length) * Math.PI * 2;
    const ux = Math.cos(a), uy = Math.sin(a);
    const nx = cx + R * ux, ny = cy + R * uy;
    const sx = cx + ux * cr, sy = cy + uy * cr;
    const ex = nx - ux * nr, ey = ny - uy * nr;
    edges += `<line class="lg-edge" x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}"></line>`;
    if (nb.out) edges += arrow(ex, ey, ux, uy, "#7f8598");
    if (nb.in) edges += arrow(sx, sy, -ux, -uy, "#7f8598");
    const anchor = ux > 0.25 ? "start" : ux < -0.25 ? "end" : "middle";
    const lx = nx + ux * (nr + 6);
    const ly = ny + uy * (nr + 6) + (Math.abs(uy) < 0.25 ? 3 : uy > 0 ? 9 : -3);
    nodes += `<g class="lg-node" data-path="${esc(nb.path)}">
      <circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="${nr}" fill="${col}"></circle>
      <text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}">${esc(trunc(n.title, 14))}</text>
    </g>`;
  });

  const centerCol = G[center.type];
  const centerG = `<g class="lg-center">
    <circle class="ring" cx="${cx}" cy="${cy}" r="${cr + 4}" stroke-width="1.3"></circle>
    <circle cx="${cx}" cy="${cy}" r="${cr}" fill="${centerCol}" stroke="#14161c" stroke-width="2"></circle>
  </g>`;

  // legend: only the types actually present
  const presentTypes = [...new Set([center.type, ...nbs.map(nb => NODES[nb.path].type)])];
  const legend = presentTypes.map(t =>
    `<span class="lgi"><span class="d" style="background:${G[t]}"></span>${TYPE_META[t].label}</span>`
  ).join("");

  const cap = `${nbs.length} direct connection${nbs.length === 1 ? "" : "s"}` +
    (extra ? ` <span class="more">(+${extra} more)</span>` : "");

  return `<div class="localgraph">
    <svg viewBox="-36 -6 344 244" role="img" aria-label="Local graph of directly connected nodes">
      ${edges}
      ${centerG}
      ${nodes}
    </svg>
    <div class="lg-legend">${legend}</div>
    <div class="lg-cap">${cap}</div>
  </div>`;
}

/* ---------- minimal markdown renderer ---------- */
function renderInline(text) {
  // internal node links first (so they survive escaping)
  const parts = [];
  const linkRe = /\[([^\]]+)\]\((\/[^)]+\.md)\)/g;
  let last = 0, m;
  while ((m = linkRe.exec(text))) {
    parts.push({ t: "text", v: text.slice(last, m.index) });
    parts.push({ t: "link", label: m[1], path: m[2] });
    last = m.index + m[0].length;
  }
  parts.push({ t: "text", v: text.slice(last) });

  return parts.map(p => {
    if (p.t === "link") {
      const node = NODES[p.path];
      if (node) {
        return `<a class="node-link" href="#" data-path="${esc(p.path)}"><span class="tdot" style="background:${TYPE_META[node.type].color}"></span>${esc(p.label)}</a>`;
      }
      return `<a class="broken" href="#" data-missing="${esc(p.path)}" title="Node not in sample: ${esc(p.path)}">${esc(p.label)}</a>`;
    }
    // escape then apply emphasis / code / external links
    let s = esc(p.v);
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
    return s;
  }).join("");
}

function renderMarkdown(body) {
  const lines = body.split("\n");
  let html = "", i = 0;
  let refMode = false; // inside "# References" ordered list -> styled refs

  function flushList(items, ordered, cls) {
    if (!items.length) return "";
    const tag = ordered ? "ol" : "ul";
    const clsAttr = cls ? ` class="${cls}"` : "";
    return `<${tag}${clsAttr}>` + items.map(x => `<li>${renderInline(x)}</li>`).join("") + `</${tag}>`;
  }

  while (i < lines.length) {
    let line = lines[i];

    // blank
    if (!line.trim()) { i++; continue; }

    // code fence
    if (line.startsWith("```")) {
      let buf = [];
      i++;
      while (i < lines.length && !lines[i].startsWith("```")) { buf.push(lines[i]); i++; }
      i++;
      html += `<pre><code>${esc(buf.join("\n"))}</code></pre>`;
      continue;
    }

    // headings
    let hm = line.match(/^(#{1,3})\s+(.*)$/);
    if (hm) {
      const level = hm[1].length, txt = hm[2].trim();
      refMode = /^references$/i.test(txt);
      html += `<h${level}>${renderInline(txt)}</h${level}>`;
      i++;
      continue;
    }

    // blockquote
    if (line.startsWith(">")) {
      let buf = [];
      while (i < lines.length && lines[i].startsWith(">")) { buf.push(lines[i].replace(/^>\s?/, "")); i++; }
      html += `<blockquote>${renderInline(buf.join(" "))}</blockquote>`;
      continue;
    }

    // ordered list
    if (/^\d+\.\s+/.test(line)) {
      let items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\d+\.\s+/, "")); i++;
      }
      html += flushList(items, true, refMode ? "refs" : "");
      continue;
    }

    // unordered list
    if (/^[-*]\s+/.test(line)) {
      let items = [];
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^[-*]\s+/, "")); i++;
      }
      html += flushList(items, false, "");
      continue;
    }

    // table:  | h | h |  then  | --- | --- |  then body rows
    if (line.trim().startsWith("|") && i + 1 < lines.length &&
        /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1]) && lines[i + 1].includes("-")) {
      const rows = [];
      while (i < lines.length && lines[i].trim().startsWith("|")) { rows.push(lines[i]); i++; }
      const cells = r => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());
      const head = cells(rows[0]);
      html += `<table><thead><tr>` + head.map(h => `<th>${renderInline(h)}</th>`).join("") +
        `</tr></thead><tbody>` +
        rows.slice(2).map(r => `<tr>` + cells(r).map(c => `<td>${renderInline(c)}</td>`).join("") + `</tr>`).join("") +
        `</tbody></table>`;
      continue;
    }

    // paragraph (gather until blank)
    let buf = [line];
    i++;
    while (i < lines.length && lines[i].trim() &&
           !/^(#{1,3}\s|>|```|[-*]\s|\d+\.\s|\|)/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    html += `<p>${renderInline(buf.join(" "))}</p>`;
  }
  return html;
}

/* ---------- rendering the page ---------- */
function render(path) {
  const node = NODES[path];
  if (!node) return;
  const tm = TYPE_META[node.type];

  // crumbs
  document.getElementById("crumbs").innerHTML =
    `<span>second-brain.okf</span><span class="sep">/</span>` +
    `<span>${tm.folder}</span><span class="sep">/</span>` +
    `<span class="leaf">${esc(path.split("/").pop())}</span>`;

  const outgoing = extractLinks(node.body);
  const incoming = backlinksFor(path);
  document.getElementById("headerRight").textContent =
    `${outgoing.length} out · ${incoming.length} in`;

  // reader
  document.getElementById("reader").innerHTML = `
    <div class="reader-inner">
      <div class="type-row">
        <span class="type-pill">${typeDot(node.type)}${tm.label}</span>
      </div>
      <h1 class="title-h1">${esc(node.title)}</h1>
      <p class="lede">${esc(node.description)}</p>
      <hr class="rule">
      <div class="md">${renderMarkdown(node.body)}</div>
    </div>`;

  // sidebar
  const badge = node.provenance.human_verified
    ? `<span class="badge verified"><span class="bdot"></span>Human verified</span>`
    : `<span class="badge unverified"><span class="bdot"></span>Unverified</span>`;

  function linkList(items) {
    if (!items.length) return `<div class="empty">None</div>`;
    return items.map(it => {
      const t = NODES[it.path] ? NODES[it.path].type : "concept";
      const title = it.title || (NODES[it.path] && NODES[it.path].title) || it.path;
      return `<div class="link-item" data-path="${esc(it.path)}">
        <span class="tdot" style="background:${TYPE_META[t].color}"></span>
        <span class="li-text">
          <div class="li-title">${esc(title)}</div>
          <div class="li-path">${esc(it.path)}</div>
        </span></div>`;
    }).join("");
  }

  const refs = node.references && node.references.length
    ? node.references.map((r, idx) => {
        const inner = `<span class="rtitle">${esc(r.title)}</span> <span class="rmeta">— ${esc(r.author)}, ${r.year}</span>`;
        const linked = r.node && NODES[r.node]
          ? `<a href="#" data-path="${esc(r.node)}">${inner}</a>`
          : inner;
        return `<div class="ref-item"><span class="rn">[${idx + 1}]</span>${linked}${r.url ? `<div class="rmeta" style="margin-top:2px">${esc(r.url)}</div>` : ""}</div>`;
      }).join("")
    : `<div class="empty">No external citations</div>`;

  document.getElementById("sidebar").innerHTML = `
    <div class="meta-block">
      <div class="meta-label">Type</div>
      <div class="meta-type">${typeDot(node.type)}${tm.label}</div>
    </div>

    <div class="meta-block">
      <div class="meta-label">Local graph <span class="count">${neighborsOf(path).length}</span></div>
      ${localGraphBlock(path)}
    </div>

    <div class="meta-block">
      <div class="meta-label">Tags <span class="count">${node.tags.length}</span></div>
      <div class="tags">${node.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>
    </div>

    <div class="meta-block">
      <div class="meta-label">Last modified</div>
      <div class="stamp">${fmtDate(node.timestamp)}<br><span class="rel">${relTime(node.timestamp)}</span></div>
    </div>

    <div class="side-divider"></div>

    <div class="meta-block">
      <div class="meta-label">Outgoing links <span class="count">${outgoing.length}</span></div>
      ${linkList(outgoing)}
    </div>

    <div class="meta-block">
      <div class="meta-label">Backlinks <span class="count">${incoming.length}</span></div>
      ${linkList(incoming.map(b => ({ path: b.path, title: b.node.title })))}
    </div>

    <div class="side-divider"></div>

    <div class="meta-block">
      <div class="meta-label">References <span class="count">${node.references ? node.references.length : 0}</span></div>
      ${refs}
    </div>

    <div class="side-divider"></div>

    <div class="meta-block" style="margin-bottom:0">
      <div class="meta-label">Provenance</div>
      <div class="prov">
        <div class="prov-row"><span class="prov-k">ai_model</span><span class="prov-v">${esc(node.provenance.ai_model)}</span></div>
        <div class="prov-row"><span class="prov-k">drafted</span><span class="prov-v">${esc(node.provenance.drafted)}</span></div>
        <div class="prov-row"><span class="prov-k">edited_by</span><span class="prov-v">${node.provenance.edited_by ? esc(node.provenance.edited_by) : "—"}</span></div>
        <div class="prov-row"><span class="prov-k">human_verified</span>${badge}</div>
      </div>
    </div>`;

  document.getElementById("reader").scrollTop = 0;
  document.getElementById("sidebar").scrollTop = 0;
  // re-trigger fade animation
  const r = document.getElementById("reader");
  r.style.animation = "none"; void r.offsetWidth; r.style.animation = "";
}

/* ---------- interactions ---------- */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

document.addEventListener("click", (e) => {
  const nav = e.target.closest("[data-path]");
  if (nav) {
    e.preventDefault();
    const p = nav.getAttribute("data-path");
    if (NODES[p]) render(p);
    return;
  }
  const missing = e.target.closest("[data-missing]");
  if (missing) {
    e.preventDefault();
    showToast(`Node not in this sample: <code>${esc(missing.getAttribute("data-missing"))}</code>`);
  }
});

document.getElementById("backBtn").addEventListener("click", () =>
  showToast("← In the full app this returns to the graph view"));
document.getElementById("backBtn").addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); e.target.click(); }
});

render(START_NODE);
</script>
</body>
</html>
